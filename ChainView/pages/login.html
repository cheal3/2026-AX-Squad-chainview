<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — ChainView</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <!-- Thymeleaf: 로그인 단독 레이아웃 -->
  <div class="cv-login-wrap">
    <div class="cv-login-inner">
      <div class="cv-login-brand">
        <div class="cv-logo-lg">CV</div>
        <h1>ChainView</h1>
        <p>관리자 콘솔</p>
      </div>

      <div class="cv-card">
        <div class="cv-card__head">
          <h2 class="cv-card__title">로그인</h2>
          <p class="cv-card__desc">관리자 권한이 필요한 내부 운영 시스템입니다</p>
        </div>
        <div class="cv-card__body">
          <form id="login-form" class="cv-stack">
            <div id="login-error" class="cv-alert is-hidden" role="alert">
              <svg class="cv-icon cv-icon--sm" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
              <span id="login-error-msg"></span>
            </div>
            <div class="cv-field">
              <label for="username">사번 또는 관리자 ID</label>
              <input class="cv-input" id="username" name="username" type="text" placeholder="사번을 입력하세요" required autocomplete="username" />
            </div>
            <div class="cv-field">
              <label for="password">비밀번호</label>
              <input class="cv-input" id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password" />
            </div>
            <button type="submit" class="cv-btn cv-btn--primary" id="login-submit">로그인</button>
          </form>

          <div class="cv-hint-box">
            <div class="cv-hint-box__row">
              <svg class="cv-icon cv-icon--sm" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
              <div>
                <strong>보안 안내</strong>
                <ul style="margin:0.5rem 0 0;padding-left:1.1rem;font-size:0.8125rem;color:#1e3a5f">
                  <li>관리자 계정만 접근 가능합니다</li>
                  <li>모든 활동은 로그로 기록됩니다</li>
                  <li>비밀번호는 주기적으로 변경해주세요</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="cv-demo-box"><strong>데모 계정:</strong> admin / admin</div>
      <p class="cv-login-footer">© 2026 ChainView. All rights reserved.</p>
    </div>
  </div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="../js/main.js"></script>
</body>
</html>
