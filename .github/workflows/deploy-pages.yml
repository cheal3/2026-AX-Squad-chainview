name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_CHAINVIEW_DATA_SOURCE: api
          VITE_CHAINVIEW_REMOTE_API_ENABLED: "true"
          VITE_CHAINVIEW_REMOTE_ORIGIN: https://chainview.kro.kr
          VITE_CHAINVIEW_API_BASE_URL: https://chainview.kro.kr
          VITE_CHAINVIEW_EMPLOYEE_NO: ${{ secrets.CHAINVIEW_EMPLOYEE_NO }}
          VITE_CHAINVIEW_DEV_LOGIN_PATH: /admin/dashboard
          VITE_CHAINVIEW_MANUAL_API_LOAD: "false"
        run: npm run build

      - name: Add SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
