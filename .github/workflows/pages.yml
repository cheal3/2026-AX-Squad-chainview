name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_CHAINVIEW_API_BASE_URL: ${{ vars.VITE_CHAINVIEW_API_BASE_URL }}
          VITE_CHAINVIEW_EMPLOYEE_NO: ${{ vars.VITE_CHAINVIEW_EMPLOYEE_NO || '8913812' }}

      - name: Add SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
